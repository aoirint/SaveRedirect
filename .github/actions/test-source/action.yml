name: Build and test SaveRedirect
description: Restore, format, build, test, package, and validate the locked project.

runs:
  using: composite
  steps:
    - name: Set up .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        global-json-file: global.json
        cache: true
        cache-dependency-path: "**/packages.lock.json"

    - name: Verify selected SDK feature band
      shell: pwsh
      run: |
        $minimumText = (Get-Content global.json -Raw | ConvertFrom-Json).sdk.version
        $actualText = dotnet --version
        try {
          $minimum = [Version]$minimumText
          $actual = [Version]$actualText
        } catch {
          throw "Expected stable .NET SDK version text, got $actualText."
        }
        $minimumBand = [Math]::Floor($minimum.Build / 100)
        $actualBand = [Math]::Floor($actual.Build / 100)
        if (
          $actual.Major -ne $minimum.Major -or
          $actual.Minor -ne $minimum.Minor -or
          $actualBand -ne $minimumBand -or
          $actual -lt $minimum
        ) {
          throw "Expected .NET SDK $minimumText or newer in its feature band, got $actualText."
        }

    - name: Restore locked dependencies
      shell: pwsh
      run: dotnet restore SaveRedirect.slnx --locked-mode

    - name: Verify formatting
      shell: pwsh
      run: dotnet format SaveRedirect.slnx --no-restore --verify-no-changes

    - name: Build
      shell: pwsh
      run: >-
        dotnet build SaveRedirect.slnx --configuration Release --no-restore
        --warnaserror

    - name: Create reproducible package
      shell: pwsh
      run: |
        $version = (dotnet msbuild SaveRedirect/SaveRedirect.csproj `
          -getProperty:Version -nologo).Trim()
        if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
          throw "Project version is not a supported package version: $version"
        }
        dotnet msbuild SaveRedirect/SaveRedirect.csproj `
          -target:PackageSaveRedirect -property:Configuration=Release -nologo
        $package = (Resolve-Path "artifacts/SaveRedirect-$version.zip").Path
        $reproduction = Join-Path $env:RUNNER_TEMP "SaveRedirect-$version.zip"
        dotnet msbuild SaveRedirect/SaveRedirect.csproj `
          -target:PackageSaveRedirect -property:Configuration=Release `
          "-property:SaveRedirectPackageOutput=$reproduction" -nologo
        $hash = (Get-FileHash -Algorithm SHA256 $package).Hash.ToLowerInvariant()
        $reproductionHash = (Get-FileHash -Algorithm SHA256 $reproduction).Hash.ToLowerInvariant()
        if ($hash -ne $reproductionHash) {
          throw "Repeated package creation produced different bytes."
        }
        "$hash  SaveRedirect-$version.zip" | Set-Content `
          -Encoding ascii artifacts/SHA256SUMS
        "SAVE_REDIRECT_VERSION=$version" | Out-File `
          -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Run boundary and archive tests
      shell: pwsh
      run: >-
        dotnet run --project SaveRedirect.Tests --configuration Release
        --no-build --
        SaveRedirect/bin/Release/netstandard2.1/com.aoirint.SaveRedirect.dll
        artifacts/SaveRedirect-$env:SAVE_REDIRECT_VERSION.zip
        $env:SAVE_REDIRECT_VERSION
