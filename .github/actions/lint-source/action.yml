name: Lint repository source
description: Check workflows, immutable action pins, and committed Markdown.

runs:
  using: composite
  steps:
    - name: Check APM project metadata
      uses: ./.github/actions/check-apm-project
      with:
        expected-apm-version: "0.25.0"

    - uses: ./.github/actions/install-workflow-tools

    - name: Lint GitHub Actions
      shell: bash
      run: actionlint -color -pyflakes=

    - name: Verify immutable action pins
      shell: bash
      run: pinact run --check --min-age 7

    - name: Verify canonical repository templates
      shell: pwsh
      run: >-
        .agents/skills/bepinex-mono-mod-quality-check/scripts/sync_templates.ps1
        -Check -RepoRoot .
        -Template
        repository-gitattributes,repository-contributing,github-pull-request-template

    - name: Lint Markdown
      uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
      with:
        config: .markdownlint-cli2.yaml
